<div
  [style.--sticky-offset-bottom.px]="scrollDimensions().bottom"
  [style.--sticky-offset-right.px]="scrollDimensions().right">
  @for (side of visibility | keyvalue; track side.key) {
    <div class="shadow" [ngClass]="side.key" [class.visible]="side.value"></div>
  }
</div>

<div cdkScrollable class="shadow-scroll" [style.height.px]="height()" [style.width.px]="width()">
  <ng-content></ng-content>
</div>
