<a mat-flat-button class="button"
   [attr.href]="url()"
   [attr.download]="download() === true ? '' : download()"
   [attr.target]="openInNewTab()"
   [matTooltip]="tooltip()"
   (click)="onClick($event)">



  @if (icon(); as icon) {
    <mat-icon
      [svgIcon]="icon.svg ? icon.id : ''"
      [fontSet]="!icon.svg ? 'symbols' : ''"
    >
      @if (!icon.svg) { {{ icon.id }} }
    </mat-icon>
  }

  <span>{{ label() }}</span>
</a>
