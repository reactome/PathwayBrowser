<div class="variables" [class.dark]="dark.isDark()" #container
     (keydown.arrowUp)="move('up')"
     (keydown.arrowDown)="move('down')"
     (keydown.arrowLeft)="move('left')"
     (keydown.arrowRight)="move('right')"
     (keydown.+)="zoomIn()"
     (keydown.-)="zoomOut()"
>

  <div id="cytoscape" #cytoscape></div>
  <div id="disease-container" class="drag-container" #compareContainer [style.display]="comparing ? 'flex': 'none'">
    <div id="handle-limits" (mouseup)="dragEnd()" (mouseleave)="dragEnd()"
         (mousemove)="dragMove($event, compareContainer, container)" [class.active]="compareDragging">
      <span id="disease-handle" class="drag-handle" (mousedown)="dragStart()"></span>
    </div>

    <div id="cytoscape-compare" #cytoscapeCompare class="drag-content"></div>
  </div>

  <div id="legend-boundary" [style.--legend-width.px]="ratio  * container.clientHeight">

    <div cdkDrag cdkDragLockAxis="x" cdkDragBoundary="#legend-boundary" id="legend-container"
         (cdkDragMoved)="updateLegend()"
         [style.height.px]="container.clientHeight">
      <div class="legend-group-wrapper">
        <div class="legend-group" [class.has-analysis]="analysis.result()"
             [style.--handle-height.px]="handle.clientHeight">
          <button id="legend-handle" cdkDragHandle #handle>LEGEND</button>
          @if (analysis.result()) {
            <div class="analysis-legend">
              <cr-analysis-legend></cr-analysis-legend>
            </div>
          }
        </div>

        <div class="thumbnail">
          <img [src]="thumbnailImg()" #thumbnail (load)="thumbnailLoaded()">
          <svg class="overlay" [attr.viewBox]="thumbnailViewBox()">
            <mask id="viewportMask" mask-type="luminance">
              <rect [attr.width]="thumbnailSize().width" [attr.height]="thumbnailSize().height" fill="white"></rect>
              <rect id="viewportRect" fill="black"
                    [attr.height]="shrunkViewport().height"
                    [attr.width]="shrunkViewport().width"
                    [attr.x]="shrunkViewport().x"
                    [attr.y]="shrunkViewport().y"
                    [attr.rx]="thumbnailRx()"></rect>
            </mask>
            <rect x="0" y="0" [attr.width]="thumbnailSize().width" [attr.height]="thumbnailSize().height"
                  fill="var(--surface, white)" opacity="0.5" mask="url(#viewportMask)"></rect>
            <rect stroke="var(--primary)" stroke-width="1" fill="none"
                  [attr.height]="shrunkViewport().height"
                  [attr.width]="shrunkViewport().width"
                  [attr.x]="shrunkViewport().x"
                  [attr.y]="shrunkViewport().y"
                  [attr.rx]="thumbnailRx()"></rect>
          </svg>
        </div>
      </div>

      <div id="legend" #legend></div>
    </div>

  </div>

  <div id="controls">
    <div class="rotated-wrapper">
      <div class="rotated">
        <mat-slider [min]="controlMinZoom()" [max]="controlMaxZoom()" [step]="1" class="slider" (input)="zoom($event)"
                    matTooltip="Zoom">
          <input matSliderThumb [value]="controlZoom()"/>
        </mat-slider>
      </div>
    </div>

      </g>
      <g class="button" id="left" (click)="move('left')" matTooltip="Move left" matTooltipPosition="before"

        <path class="icon" d="M8.2915 19.6069L2.7399 25.1585L8.2915 30.7102" stroke="var(--on-primary, white)"
