<div id="tree-container">
<mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
  <!-- This is the tree node template for leaf nodes -->
  <mat-tree-node *matTreeNodeDef="let node" [matTreeNodePadding]="0">
    <div class="ref-row-container">
      <div class="left">
        <div class="publication">
          <div class="ribbon"></div>
          <span class="publication-title">{{ node.displayName }}</span>
        </div>
        <div class="authors">
          <span class="authors">authors</span>
        </div>
      </div>
      <div class="right">
        <div class="journal">
          <span class="journal-text"> {{ node.journal }}</span>
        </div>
        <div class="quote-container">
          <a [href]="node.url" target="_blank">
            <mat-icon class='quote-icon' [svgIcon]="'format-quote'">></mat-icon>
          </a>
        </div>
      </div>
    </div>
  </mat-tree-node>

  <!-- This is the tree node template for expandable nodes -->
  <mat-tree-node *matTreeNodeDef="let node;when: hasChild" [matTreeNodePadding]="0" matTreeNodeToggle
                 [cdkTreeNodeTypeaheadLabel]="node.name" class="root">
    <button mat-icon-button matTreeNodeToggle class="button"
            [attr.aria-label]="'Toggle ' + node.name">
      <mat-icon class="ref-icon" [svgIcon]="tree.isExpanded(node) ? 'expand' : 'collapse'"></mat-icon>
    </button>
    {{ node.name }}
  </mat-tree-node>
</mat-tree>
</div>
