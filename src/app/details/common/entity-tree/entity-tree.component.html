<div id="component-container">
  <div class="depth-controller">
    <button mat-icon-button class="arrow" [disabled]="depthIndex === 1" (click)="firstPage()">
      <mat-icon>first_page</mat-icon>
    </button>
    <button mat-icon-button class="arrow" [disabled]="depthIndex === 1" (click)="previousPage()">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span class="counter">{{ depthIndex }}</span>

    <button mat-icon-button class="arrow" [disabled]="depthIndex === length" (click)="nextPage()">
      <mat-icon>chevron_right</mat-icon>
    </button>
    <button mat-icon-button class="arrow" [disabled]="depthIndex === length" (click)="lastPage()">
      <mat-icon>last_page</mat-icon>
    </button>

  </div>

  <div class="composition-container">

    <mat-tree #tree [dataSource]=dataSource [childrenAccessor]="childrenAccessor" class="component-tree">
      <!-- This is the tree node template for leaf nodes -->

      <mat-nested-tree-node *matTreeNodeDef="let node" [ngClass]=getNodeConnector(node)>
        {{ node.name[0]}}


      </mat-nested-tree-node>


      <!-- This is the tree node template for expandable nodes -->
      <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" [cdkTreeNodeTypeaheadLabel]="node.name"
                            (expandedChange)="loadChildren(node)"
                            [ngClass]=getNodeConnector(node)>

        <div class="mat-tree-node">
          <div class="tree-node">
            <div class="left" matTreeNodeToggle>
              <mat-icon
                class="symbol-icon"
                [matTooltip]="getSymbol(node).tooltip"
                [svgIcon]="getSymbol(node).name">
              </mat-icon>

              <div class="treeNodeToggle"
                   [attr.aria-label]="'Toggle ' + node.name">
                <mat-icon class="mat-icon-rtl-mirror"
                          [svgIcon]="tree.isExpanded(node) ? 'collapse' : 'expand'"></mat-icon>

              </div>
              {{ node.name[0]}}
            </div>
            <div class="right">
              <span class="compartment" matTreeNodeToggle>{{ node.displayName | extractCompartment }}</span>
              @if (node.speciesName){
                <span class="species" matTreeNodeToggle>{{ node.speciesName }}</span>
              }
              <div class="select-container">
                <a href="">
                  <mat-icon class='custom-icon' [svgIcon]="'select'"></mat-icon>
                </a>
              </div>
              <div class="goTo-container">
                <a href="">
                  <mat-icon class='custom-icon' [svgIcon]="'double-arrow-right'"></mat-icon>
                </a>
              </div>
            </div>
          </div>

        </div>


        <!-- There is inline padding applied to this div using styles.
            This padding value depends on the mat-icon-button width.  -->

        <div [class.component-tree-invisible]="!tree.isExpanded(node)" role="group" class="group">
          <ng-container matTreeNodeOutlet></ng-container>
        </div>

      </mat-nested-tree-node>
    </mat-tree>


  </div>
</div>
