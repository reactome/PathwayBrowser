<div class="publication-container">
  <div class="left">

    <div class="title">
      <div class="ribbon"></div>
      <span class="publication-name">{{ ref().displayName }}</span>
    </div>

    <div class="authors-container" *ngIf="ref().author[0] as firstAuthor">

      <div class="authors">
        <!-- First author -->
        <!--        <a [href]="environment + '/content/detail/person/'+ firstAuthor.dbId" target="_blank"> -->
        <span>{{ firstAuthor.surname }} {{ firstAuthor.initial }}</span>
        <!--        </a>-->

        <!-- Show the rest of the authors when expanded -->
        <ng-container *ngIf="isExpanded" class="additional-authors">
            <span *ngFor="let author of ref().author.slice(1)">
              <!--          <a [href]="environment + '/content/detail/person/'+ author.dbId" target="_blank">-->
              , {{ author.surname }} {{ author.initial }}
              <!--          </a>-->
            </span>
        </ng-container>

        <!-- ORCID-->
        <span *ngIf="firstAuthor.orcidId">
          <a [href]="'https://orcid.org/' + firstAuthor.orcidId" target="_blank">
          <mat-icon class="ref-icon" [svgIcon]="'orcid'"></mat-icon>
          </a>
        </span>

        <!--et al.-->
        <span *ngIf="ref().author.length > 1 && !isExpanded">&nbsp;et al.</span>

        <!--year-->
        <span *ngIf="showYear()">  - {{ ref().year }}</span>

        <!--icon-->
        <span *ngIf="ref().author.length > 1">
          <mat-icon class="ref-icon" [svgIcon]="isExpanded ? 'expand' : 'collapse'" (click)="toggleAuthors()"></mat-icon>
        </span>

      </div>
    </div>

  </div>
  <div class="right">
    <div class="journal">
      <span class="journal-name"> {{ ref().journal }}</span>
    </div>
    <div class="quote-container" *ngIf="ref().url">
      <a [href]="ref().url" target="_blank">
        <mat-icon class='quote-icon' [svgIcon]="'format-quote'">></mat-icon>
      </a>
    </div>
  </div>
</div>
