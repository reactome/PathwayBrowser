<div class="details-content-container">

  <!-- provide more details for the selectable object on details tab,overview,  externalRefs(including structure for protein and chemical), xRefs-->
  @if (!isMoleculeView()) {
    <cr-description-overview [obj]="obj()" [showSpecies]="false"></cr-description-overview>
  }

  @if (isLoading()) {
    <div class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
  }

  <!-- External Reference -->
  @if (refEntity()) {
    @if (!isMoleculeView())  {
      <mat-divider/>
    }
    <cr-external-reference [referenceEntity]=refEntity()! [xRefs]="xRefs()" [displayReference]="!isMoleculeView()"></cr-external-reference>
  }

  <!-- Cross References -->
  @if (xRefs().length > 0) {
    <mat-divider/>
    <cr-cross-references [crossRefs]=xRefs()></cr-cross-references>
    <!-- only provide this info for RNA/DNA which is Entity from backend on molecule tab -->
  } @else if (isMoleculeView() && moleculeType() === MoleculeType.ENTITY) {
    <cr-notice-info />
  }
</div>
