<div class="controls">

  <!--    <mat-icon>download</mat-icon>-->
  <!--    Download-->
  <!--  </button>-->

  <button class="button" mat-flat-button [matTooltip]="'Download the data shown in the Molecules tab as a TSV'" [class.disabled]="exportedColumns().length === 0" (click)="exportToTSV()">
    <mat-icon>download</mat-icon>
    Download
  </button>

</div>

<table mat-table [dataSource]="dataSource" matSort matSortActive="type"
       matSortDirection="asc">
  <!-- Type Column -->
  <ng-container matColumnDef="type">
    <th mat-header-cell mat-sort-header *matHeaderCellDef>
      <div class="header">
        <mat-checkbox [(ngModel)]="includeType" (click)="$event.stopPropagation()">Molecule Type</mat-checkbox>
        <button mat-icon-button (click)="$event.stopPropagation()"
                [matMenuTriggerFor]="categoryMenu">
          <mat-icon fontSet="symbols">filter_alt</mat-icon>
        </button>
      </div>
    </th>
    <td mat-cell *matCellDef="let element" [class.included]="includeType()">
      {{ element.type }}
    </td>
  </ng-container>

  <!-- Identifier Column -->
  <ng-container matColumnDef="identifier">
    <th mat-header-cell *matHeaderCellDef>
      <div class="header">
        <mat-checkbox [(ngModel)]="includeIdentifier">Identifier</mat-checkbox>
      </div>
    </th>
    <td mat-cell *matCellDef="let element" [class.included]="includeIdentifier()">
      {{ element.identifier }}
    </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>
      <div class="header">
        <mat-checkbox [(ngModel)]="includeName">Molecule Name</mat-checkbox>
      </div>
    </th>
    <td mat-cell *matCellDef="let element" [class.included]="includeName()">
        {{ element.name }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>
</table>

<mat-menu #categoryMenu="matMenu">
  @for (category of category(); track category) {
    <div mat-menu-item (click)="$event.stopPropagation()">
      <mat-checkbox [checked]="category"
                    (change)="onCategoryToggle(category)"
                    (click)="$event.stopPropagation()">
        {{ category }}
      </mat-checkbox>
    </div>
  }
</mat-menu>
