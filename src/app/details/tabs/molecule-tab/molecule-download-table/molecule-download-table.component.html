<mat-form-field>
  <mat-label>Molecule Types</mat-label>
  <mat-select [disabled]="!includeType()" [(value)]="selectedCategory" multiple>
    @for (category of category(); track category) {
      <mat-option [value]="category">{{category}}</mat-option>
    }
  </mat-select>
</mat-form-field>

<mat-checkbox  [(ngModel)]="includeType">Type</mat-checkbox>
<mat-checkbox [(ngModel)]="includeIdentifier">Identifier</mat-checkbox>
<mat-checkbox [(ngModel)]="includeName">Name</mat-checkbox>


<table mat-table [dataSource]="dataSource">
  <!-- Type Column -->
  <ng-container matColumnDef="type">
  <th mat-header-cell *matHeaderCellDef> Molecule Type</th>
  <td mat-cell *matCellDef="let element"> {{element.type}} </td>
  </ng-container>

  <!-- Identifier Column -->
  <ng-container matColumnDef="identifier">
    <th mat-header-cell *matHeaderCellDef> Identifier</th>
    <td mat-cell *matCellDef="let element"> {{element.identifier}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Molecule Name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>
</table>
