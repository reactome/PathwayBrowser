<ng-template #dividerTemplate let-text>
  <div class="divider-name">
    <div class="line">
      <mat-divider class="divider"></mat-divider>
    </div>
    <div class="text">{{ text }}</div>
    <div class="line">
      <mat-divider class="divider"></mat-divider>
    </div>
  </div>
</ng-template>


<div *ngIf="obj" class="details">

  <div class="content">

    <div class="header">
      <div class="label">
        <mat-icon
          class="custom-icon"
          [matTooltip]="getIcon(obj).tooltip"
          [svgIcon]="getIcon(obj).name">
        </mat-icon>
        <span class="name">{{ obj.displayName }}</span>
      </div>
      <div class="details-button">
        <button mat-button (click)="OpenDetailsPage(obj.stId)">
          <mat-icon class="custom-icon double-arrow" [svgIcon]="'double-arrow-right'"></mat-icon>
          <span class="details-label"> Details page</span>
        </button>
      </div>
    </div>


    <div class="overview" [ngClass]="{'update-layout': obj.referenceEntity}">
      <cr-details-overview [obj]="obj"></cr-details-overview>
      <div *ngIf="obj.hasIcon" class="icon-container">
        <div class="icon" [innerHTML]="iconContent"></div>
      </div>
    </div>

    <div class="elements-container" *ngFor="let element of elements">
      <div *ngIf="obj[element.key]" class="section-container" [id]="element.key">
        <div class="divider-container">
          <div class="divider-name-container">
            <ng-container *ngTemplateOutlet="dividerTemplate; context: { $implicit: element.label }"></ng-container>
          </div>
          <div class="divider-line-container">
            <mat-divider class="divider"></mat-divider>
          </div>
        </div>
        <div class="content-container">
          <div class="control-container">this is navigation control</div>
          <div class="composition-container">
            <div class="item">this is test content</div>
          </div>
        </div>
      </div>
    </div>


    <div class="divider-container">
      <div class="divider-name-container">
        <ng-container *ngTemplateOutlet="dividerTemplate; context: { $implicit: 'References' }"></ng-container>
      </div>
      <div class="divider-line-container">
        <mat-divider class="divider"></mat-divider>
      </div>
    </div>
    <div class="content-container">
      <div class="control-container">this is navigation control</div>
      <div class="composition-container">
        <div class="ref-row-container" *ngFor="let ref of obj.literatureReference">
          <div class="left">
            <div class="publication">
              <div class="ribbon"></div>
              <span class="publication-title">{{ ref.displayName }}</span>
            </div>
            <div class="authors">
              <span class="authors">authors</span>
            </div>
          </div>
          <div class="right">
            <div class="journal">
              <span class="journal-text"> {{ ref.journal }}</span>
            </div>
            <div class="quote-container">
              <a [href]="ref.url" target="_blank">
                <mat-icon class='quote-icon' [svgIcon]="'format-quote'">></mat-icon>
              </a>
            </div>
          </div>
        </div>


      </div>
    </div>


  </div>

  <div class="toc">
    <ng-container *ngFor="let element of elements">
      <nav>
        <!--      <a *ngIf="obj[element.key]" (click)="scrollToSection(element.key)">{{ element.label }}</a>-->
        <!-- Add href with '#' and section.key as the id -->
        <a *ngIf="obj[element.key]" [href]="currentUrl + '#' + element.key">
          {{ element.label }}
        </a>
      </nav>
    </ng-container>
    <span>Test tissue: 9727355</span>
  </div>

</div>
